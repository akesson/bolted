experimental = []

[cargo]
global_args = []

[cargo.command_args]

[package]
name = "spike_profile_ffi"
crate = "spike_profile_ffi"

[targets.apple]
enabled = true
output = "package"
deployment_target = "16.0"
include_macos = true

[targets.apple.swift]
module_name = "SpikeProfileFfi"
tools_version = "5.9"
error_style = "throwing"

[targets.apple.swift.type_mappings]

[targets.apple.xcframework]

[targets.apple.spm]
distribution = "local"
layout = "bundled"
wrapper_sources = "Sources/SpikeProfile"
skip_package_swift = false

[targets.apple.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.android]
enabled = false
output = "dist/android"
min_sdk = 24

[targets.android.kotlin]
package = "com.example.spike_profile_ffi"

[targets.wasm]
enabled = false
triple = "wasm32-unknown-unknown"
profile = "release"
output = "dist/wasm"

[targets.java.jvm]
enabled = false
output = "dist/java"

[targets.java.android]
enabled = false
output = "dist/java/android"
min_sdk = 24

[targets.dart]
output = "dist/dart"
enabled = false

[targets.python]
output = "dist/python"
enabled = false

[targets.csharp]
output = "dist/csharp"
enabled = false
