experimental = []

[cargo]
global_args = []

[cargo.command_args]

[package]
name = "spike_profile_ffi"

[targets.apple]
enabled = true
output = "dist/apple"
deployment_target = "16.0"
# macOS slice required so a plain `swift test` runs on the Mac (the mise CLI test path).
include_macos = true

[targets.apple.swift]
module_name = "SpikeProfileFfi"
tools_version = "5.9"
error_style = "throwing"

[targets.apple.swift.type_mappings]

[targets.apple.xcframework]

[targets.apple.spm]
distribution = "local"
layout = "ffi-only"
skip_package_swift = false

[targets.apple.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.android]
# Apple-only probe (step 05 covers Android): disabled so `boltffi check`/`pack` stay Apple-scoped.
enabled = false
output = "dist/android"
min_sdk = 24

[targets.android.kotlin]
package = "com.example.spike_profile_ffi"
desktop_loader = "bundled"
api_style = "top_level"
error_style = "throwing"
factory_style = "constructors"

[targets.android.kotlin.type_mappings]

[targets.android.header]

[targets.android.pack]

[targets.android.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.kotlin_multiplatform]
output = "dist/kotlin-multiplatform"
enabled = false
preview_prune_unsupported = false

[targets.wasm]
enabled = false
triple = "wasm32-unknown-unknown"
profile = "release"
output = "dist/wasm"

[targets.wasm.optimize]

[targets.wasm.typescript.type_mappings]

[targets.wasm.npm]

[targets.java.jvm]
enabled = false
output = "dist/java"
strip_symbols = false

[targets.java.jvm.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.java.android]
enabled = false
output = "dist/java/android"
min_sdk = 24

[targets.dart]
output = "dist/dart"
enabled = false

[targets.python]
output = "dist/python"
enabled = false

[targets.python.wheel]

[targets.csharp]
output = "dist/csharp"
enabled = false

[targets.csharp.nuget]
