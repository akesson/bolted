experimental = []

[cargo]
global_args = []

[cargo.command_args]

[package]
name = "bolted_http_android_ffi"
crate = "bolted_http_android_ffi"

# Apple is DISABLED here: the Apple bridge is its own crate (`bolted-http-apple-ffi`). This crate
# packs only the Android/Kotlin target.
[targets.apple]
enabled = false
output = "dist/apple"
deployment_target = "16.0"
include_macos = true

[targets.apple.swift]
module_name = "BoltedHttpAndroid"
tools_version = "5.9"
error_style = "throwing"

[targets.apple.swift.type_mappings]

[targets.apple.xcframework]

[targets.apple.spm]
distribution = "local"
layout = "ffi-only"
skip_package_swift = false

[targets.apple.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

# Step 26 (Android adapter). One ABI only: the conformance tier runs on an arm64-v8a emulator
# (aosp_atd android-34), matching gen-profile-ffi's rationale — a release build statically links
# url -> idna -> icu, so extra ABIs would multiply an already-slow pack for zero extra evidence.
# The generated Kotlin + jniLibs land in `dist/android/{kotlin,jniLibs}` and are consumed IN PLACE
# by `android/bolted-http` (the proven `pack:android` / profile-probe layout).
[targets.android]
enabled = true
output = "dist/android"
min_sdk = 24
architectures = ["arm64"]

[targets.android.kotlin]
package = "dev.bolted.http.ffi"
desktop_loader = "bundled"
api_style = "top_level"
error_style = "throwing"
factory_style = "constructors"

[targets.android.kotlin.type_mappings]

[targets.android.header]

[targets.android.pack]

[targets.android.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.kotlin_multiplatform]
output = "dist/kotlin-multiplatform"
enabled = false
preview_prune_unsupported = false

[targets.wasm]
enabled = false
triple = "wasm32-unknown-unknown"
profile = "release"
output = "dist/wasm"

[targets.wasm.optimize]

[targets.wasm.typescript.type_mappings]

[targets.wasm.npm]

[targets.java.jvm]
enabled = false
output = "dist/java"
strip_symbols = false

[targets.java.jvm.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.java.android]
enabled = false
output = "dist/java/android"
min_sdk = 24

[targets.dart]
output = "dist/dart"
enabled = false

[targets.python]
output = "dist/python"
enabled = false

[targets.python.wheel]

[targets.csharp]
output = "dist/csharp"
enabled = false

[targets.csharp.nuget]
