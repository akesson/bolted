experimental = []

[cargo]
global_args = []

[cargo.command_args]

[package]
name = "gen_profile_ffi"

[targets.apple]
enabled = true
output = "dist/apple"
deployment_target = "16.0"
# macOS slice required so a plain `swift test` runs on the Mac (the mise CLI test path).
include_macos = true

[targets.apple.swift]
module_name = "GenProfileFfi"
tools_version = "5.9"
error_style = "throwing"

[targets.apple.swift.type_mappings]

[targets.apple.xcframework]

[targets.apple.spm]
distribution = "local"
layout = "ffi-only"
skip_package_swift = false

[targets.apple.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.android]
# Step 05 (Android headless probe). One ABI only: the probe runs on an arm64-v8a emulator, and a
# release build of this crate statically links url -> idna -> icu, so four ABIs would quadruple a
# already-slow pack for zero extra evidence.
enabled = true
output = "dist/android"
min_sdk = 24
architectures = ["arm64"]

[targets.android.kotlin]
package = "com.example.gen_profile_ffi"
desktop_loader = "bundled"
api_style = "top_level"
error_style = "throwing"
factory_style = "constructors"

[targets.android.kotlin.type_mappings]

[targets.android.header]

[targets.android.pack]

[targets.android.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.kotlin_multiplatform]
output = "dist/kotlin-multiplatform"
enabled = false
preview_prune_unsupported = false

[targets.wasm]
enabled = false
triple = "wasm32-unknown-unknown"
profile = "release"
output = "dist/wasm"

[targets.wasm.optimize]

[targets.wasm.typescript.type_mappings]

[targets.wasm.npm]

[targets.java.jvm]
enabled = false
output = "dist/java"
strip_symbols = false

[targets.java.jvm.debug_symbols]
enabled = false
format = "zip"
bundle = "unstripped"

[targets.java.android]
enabled = false
output = "dist/java/android"
min_sdk = 24

[targets.dart]
output = "dist/dart"
enabled = false

[targets.python]
output = "dist/python"
enabled = false

[targets.python.wheel]

# Step 14 (C# port). One RID only — osx-arm64, this Mac — for the same reason the Android target
# builds one ABI: the tier is dotnet-on-macOS (the binding seam is host-portable; the WinUI face is
# not). Namespace `GenProfileFfi`, `net10.0` and throwing errors are boltffi's defaults and match the
# Swift module name; nothing to override.
[targets.csharp]
output = "dist/csharp"
enabled = true

[targets.csharp.nuget]
