# deliberately NOT part of `check` (which stays host-only: no Xcode, no codesign, no launchctl).
# The spike's Rust crates ARE workspace members, so `check` builds and tests them like everything
# else; only the OS-facing tiers live behind these verbs. ---

[tasks."test:os:sandbox"]
