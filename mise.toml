[tools]
rust = "1.95.0"
# Step 04 (web spike): the wasm bundler + the headless-wasm test runner, pinned like everything
# else. NOTE: mise's registry shortname `trunk` is the WRONG tool (trunk.io's launcher), so the
# bundler is pinned by GitHub repo instead.
"github:trunk-rs/trunk" = "0.21.14"
"github:rustwasm/wasm-pack" = "0.15.0"
# NOTE: the Android probe's JDK + Gradle are deliberately NOT here. They are scoped to the
# `test:android*` tasks (mise per-task `tools`) so that `mise run check` never drags a ~300 MB JDK
# onto a machine that only wants to build Rust. Same spirit as step 02 keeping `boltffi_cli` out of
# `[tools]`. See docs/steps/step-05-android-probe.md (Deliverable 3).

# --- Step 10: the generated FFI layer (D22). BoltFFI's bindgen reads source text and never sees
# expanded code, so the FFI surface must EXIST as source. `check` regenerates it in memory and
# byte-compares (crates/gen-*-ffi/tests/drift.rs), which is why this verb is not part of `check`:
# a verb that rewrites the file it is meant to verify cannot verify it. ---

[tasks."gen:ffi"]
description = "Regenerate the committed FFI source for every generated feature (D22)."
run = """
set -eu
gen() {
  cargo run -q -p bolted-ffi-gen --bin gen-ffi -- \
    "crates/$1/src/lib.rs" "$2" "crates/$1-ffi/src/generated.rs"
}
gen gen-note    gen_note
gen gen-profile gen_profile
# `check` also runs `cargo fmt --all --check`, and rustfmt owns every file in the workspace. The
# drift check compares code rather than bytes for exactly this reason; formatting here keeps the two
# verbs from fighting over the same file.
cargo fmt -p gen_note_ffi -p gen_profile_ffi
# The constraint-surface snapshot (step 16, D27's build-time half). `bolted-check` renders it from the
# parsed declaration; the generator lives in the -ffi crate because only there are the feature's
# runtime `constraints()` (incl. the DateRange composite, D20) and `STASH_SCHEMA_VERSION` linked.
# Byte-checked by `mise run check` (crates/gen-*-ffi/tests/constraint_snapshot.rs); NOTHING formats a
# `.snap`, which is what keeps that byte comparison honest (D28). A one-token constraint edit is a
# one-line diff here instead of noise inside a regenerated generated.rs.
cargo run -q -p gen_note_ffi --example gen-note-constraints -- crates/gen-note/constraints.snap
cargo run -q -p gen_profile_ffi --example gen-profile-constraints -- crates/gen-profile/constraints.snap
# The foreign stash codec (D28): profile-app persists a draft across process death, and the codec is
# emitted from the same declaration. Byte-compared by `mise run check` — no Gradle, NDK or formatter
# in the loop, which is exactly what makes that comparison honest. Only `gen-profile` has a stash
# consumer, so only it gets a codec (gen-note does not, as Apple does not).
cargo run -q -p bolted-ffi-gen --bin gen-kotlin-codec -- \
  "crates/gen-profile/src/lib.rs" \
  "com.example.gen_profile_ffi" \
  "dev.bolted.profileapp.generated" \
  "android/profile-app/src/main/kotlin/dev/bolted/profileapp/generated/ProfileStashCodec.kt"
# The per-language contract suite (D28, step 13): every emitted C-ID projected through the public
# generated surface, generic over the hand-written values-only fixture beside it. Byte-compared by
# `mise run check`; run on the emulator by `test:android`. Only `gen-profile` has a probe tier.
cargo run -q -p bolted-ffi-gen --bin gen-kotlin-suite -- \
  "crates/gen-profile/src/lib.rs" \
  "com.example.gen_profile_ffi" \
  "dev.bolted.profileprobe.generated" \
  "android/profile-probe/src/androidTest/kotlin/dev/bolted/profileprobe/generated/ProfileConformanceSuite.kt"
# The Swift contract suite (D28, step 13) — same map, one language out. Run on the simulator/macOS by
# `test:apple`. `@testable import GenProfileFfi` is the Swift binding module.
cargo run -q -p bolted-ffi-gen --bin gen-swift-suite -- \
  "crates/gen-profile/src/lib.rs" \
  "GenProfileFfi" \
  "apple/profile-probe/Tests/ProfileProbeTests/Generated/ProfileConformanceSuite.swift"
echo
echo 'Now read the diff. `mise run check` refuses a committed file no declaration produces.'
"""

# --- Step 10 built the generator; step 11 repointed every shell (and `pack:apple`/`pack:android`
# below) at the GENERATED `gen-profile-ffi`. The hand-written `spike-profile-ffi` stays in the
# workspace as the reference — built and tested by `check`, packed by nothing. The two smoke suites
# stay as the lowest tier against the same dist. ---

[tasks."test:apple:gen"]
description = "Run the smoke suite against the generated Swift bindings (declaration -> Swift)."
depends = ["pack:apple"]
run = """
set -eu
if ! command -v swift >/dev/null 2>&1; then
  echo "error: swift toolchain not found — needs Xcode (VISION risk 5)." >&2
  exit 1
fi
swift test --package-path apple/gen-profile-smoke
"""

[tasks."test:android:gen"]
description = "Run the Kotlin smoke suite against the generated bindings on the headless emulator."
depends = ["pack:android"]
dir = "android/gen-profile-smoke"
tools = { java = "temurin-21.0.11+10.0.LTS", gradle = "8.11.1" }
run = """
set -eu
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
if [ ! -d "$ANDROID_HOME" ]; then
  echo "error: Android SDK not found at $ANDROID_HOME — set ANDROID_HOME (VISION risk 5)." >&2
  exit 1
fi
if [ ! -d "$ANDROID_HOME/system-images/android-34/aosp_atd" ]; then
  echo "error: missing the aosp_atd android-34 system image (the headless test device)." >&2
  echo "  sdkmanager 'system-images;android-34;aosp_atd;arm64-v8a'" >&2
  exit 1
fi
gradle dev34DebugAndroidTest "$@"
"""

[tasks.test]
run = "cargo test --workspace"

[tasks.check]
run = [
  "cargo fmt --all --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
  "cargo test --workspace",
]

# --- Step 02: Apple probe (separate verbs; deliberately NOT part of `check`, so a box without
# Xcode/the boltffi CLI still runs `check` green). See docs/steps/step-02-boltffi-probe.md. ---

# The boltffi CLI cannot be pinned via mise's cargo backend in this repo: boltffi_bindgen builds
# through askama 0.16, whose template-path resolution breaks when the cargo registry lives behind
# a symlink (this machine's `~/.cargo` → dotfiles). Canonicalizing CARGO_HOME sidesteps it (a no-op
# on a normal, non-symlinked setup). Pinned version recorded here; see the step-02 report.
[tasks."setup:boltffi"]
description = "Install the pinned boltffi CLI (idempotent; works around the askama symlink bug)."
run = """
set -eu
want="0.27.5"
export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
if command -v boltffi >/dev/null 2>&1 && boltffi --version 2>/dev/null | grep -q "$want"; then
  echo "boltffi $want already installed"
  exit 0
fi
home="$(cd -P "${CARGO_HOME:-$HOME/.cargo}" 2>/dev/null && pwd || echo "${CARGO_HOME:-$HOME/.cargo}")"
echo "Installing boltffi_cli@$want (CARGO_HOME=$home) ..."
CARGO_HOME="$home" cargo install boltffi_cli --version "$want"
"""

[tasks."pack:apple"]
description = "Build + package the Apple XCFramework + SwiftPM bindings (release, gen-profile-ffi)."
depends = ["setup:boltffi"]
# Step 11: repointed from the hand-written `spike-profile-ffi` (which stays in the workspace as the
# reference, packed by nothing) to the generated crate. Every Swift consumer links this dist.
dir = "crates/gen-profile-ffi"
run = """
set -eu
export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
if ! command -v boltffi >/dev/null 2>&1; then
  echo "error: boltffi CLI not found — run 'mise run setup:boltffi'." >&2
  exit 1
fi
if ! command -v xcodebuild >/dev/null 2>&1; then
  echo "error: Xcode not found — the Apple probe needs Xcode + the Apple SDKs (VISION risk 5)." >&2
  exit 1
fi
# `boltffi pack apple` builds iOS device/sim + macOS x86_64/arm64; a fresh toolchain has only the
# host target and the pack fails with an opaque "build failed for targets". Install them if missing.
if command -v rustup >/dev/null 2>&1; then
  rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios x86_64-apple-darwin \
    >/dev/null 2>&1 || true
fi
# `boltffi generate swift` writes Sources/*.swift while `pack apple` writes Sources/BoltFFI/*.swift.
# Both in one dist/ makes SwiftPM fail with "multiple producers". Pack owns this directory.
rm -rf dist/apple
boltffi pack apple --release
"""

[tasks."test:apple"]
description = "Run the Apple XCTests — probe + app VM tests — on the macOS slice (packs first)."
depends = ["pack:apple"]
run = """
set -eu
if ! command -v swift >/dev/null 2>&1; then
  echo "error: swift toolchain not found — the Apple probe needs Xcode (VISION risk 5)." >&2
  exit 1
fi
swift test --package-path apple/profile-probe
swift test --package-path apple/profile-app
"""

[tasks."test:apple:ui"]
description = "Run the XCUITest UI suite (items 2–6). Xcode + a logged-in GUI session required."
depends = ["pack:apple"]
dir = "apple/profile-app"
run = """
set -eu
# Deliberately NOT part of `check`/`test`/`test:apple`: XCUITest drives a real window, so it needs a
# logged-in GUI session AND the controlling app (terminal/editor) to hold Accessibility permission
# (System Settings → Privacy & Security → Accessibility). Without it the runner fails with
# "Timed out while enabling automation mode". See docs/steps/step-03-report.md.
if ! command -v xcodegen >/dev/null 2>&1; then
  echo "error: xcodegen not found — install with 'brew install xcodegen'." >&2
  exit 1
fi
xcodegen generate
xcodebuild test \
  -project ProfileAppUITest.xcodeproj \
  -scheme BoltedProfile \
  -destination 'platform=macOS' \
  -derivedDataPath .build-xcode
"""

# --- Step 04: Rust web spike (Leptos, browser CSR). Separate verbs; deliberately NOT part of
# `check` (which stays host-only, Xcode-free, browser-free) — the web work lives behind
# `build:web` / `serve:web` / `test:web`, exactly as the Apple work lives behind `pack:apple` /
# `test:apple`. See docs/steps/step-04-rust-web-app.md. ---

[tasks."build:web"]
description = "Release-build the Leptos web app to wasm and bundle it (Trunk runs wasm-opt)."
dir = "crates/profile-web"
run = """
set -eu
if ! command -v trunk >/dev/null 2>&1; then
  echo "error: trunk not found — run 'mise install' (pinned as github:trunk-rs/trunk)." >&2
  exit 1
fi
# A fresh toolchain has only the host target; self-heal like pack:apple does for the Apple targets.
if command -v rustup >/dev/null 2>&1; then
  rustup target add wasm32-unknown-unknown >/dev/null 2>&1 || true
fi
trunk build --release
"""

[tasks."serve:web"]
description = "Serve the web app with hot reload and open it in a browser (the manual protocol)."
dir = "crates/profile-web"
run = """
set -eu
if ! command -v trunk >/dev/null 2>&1; then
  echo "error: trunk not found — run 'mise install' (pinned as github:trunk-rs/trunk)." >&2
  exit 1
fi
if command -v rustup >/dev/null 2>&1; then
  rustup target add wasm32-unknown-unknown >/dev/null 2>&1 || true
fi
trunk serve --open
"""

[tasks."test:web"]
description = "Run the headless wasm-bindgen-test suite in Chrome (no GUI session needed)."
dir = "crates/profile-web"
run = """
set -eu
if ! command -v wasm-pack >/dev/null 2>&1; then
  echo "error: wasm-pack not found — run 'mise install' (pinned as github:rustwasm/wasm-pack)." >&2
  exit 1
fi
if [ ! -d "/Applications/Google Chrome.app" ] && ! command -v google-chrome >/dev/null 2>&1 \\
  && ! command -v chromium >/dev/null 2>&1; then
  echo "error: Chrome/Chromium not found — the headless wasm tier drives a real (headless)" >&2
  echo "browser engine. Install Google Chrome (wasm-pack fetches a matching chromedriver)." >&2
  exit 1
fi
if command -v rustup >/dev/null 2>&1; then
  rustup target add wasm32-unknown-unknown >/dev/null 2>&1 || true
fi
# --test web: only the DOM tier runs in the browser. The controller tests are host tests and
# already ran under `check`; building them for wasm would just be slow.
wasm-pack test --headless --chrome --test web
"""

# --- Step 05: Android headless probe (JNI + ART). Separate verbs, deliberately NOT part of `check`
# (which stays Rust-only: no JDK, no Android SDK, no emulator). See docs/steps/step-05-android-probe.md. ---

[tasks."pack:android"]
description = "Build the arm64-v8a .so + generate the Kotlin/JNI bindings (release, gen-profile-ffi)."
depends = ["setup:boltffi"]
# Step 11: repointed from `spike-profile-ffi` to the generated crate (see pack:apple's note).
dir = "crates/gen-profile-ffi"
run = """
set -eu
export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
if ! command -v boltffi >/dev/null 2>&1; then
  echo "error: boltffi CLI not found — run 'mise run setup:boltffi'." >&2
  exit 1
fi
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
if [ ! -d "$ANDROID_HOME" ]; then
  echo "error: Android SDK not found at $ANDROID_HOME — set ANDROID_HOME (VISION risk 5)." >&2
  exit 1
fi
# boltffi finds the NDK via ANDROID_NDK_HOME; pick the newest installed one.
ndk="$(ls -d "$ANDROID_HOME"/ndk/* 2>/dev/null | sort -V | tail -1 || true)"
if [ -z "$ndk" ]; then
  echo "error: no Android NDK under $ANDROID_HOME/ndk — install one:" >&2
  echo "  sdkmanager 'ndk;27.0.12077973'" >&2
  exit 1
fi
export ANDROID_NDK_HOME="$ndk"
# A fresh toolchain has only the host target; self-heal like pack:apple and build:web do.
if command -v rustup >/dev/null 2>&1; then
  rustup target add aarch64-linux-android >/dev/null 2>&1 || true
fi

# BoltFFI 0.27.3 shipped `pack android` broken: it passed `env: Vec::new()` to the crate build, so
# `#[export]` fell back to legacy short symbol names (`boltffi_profile_store_ffi_checkout`) while the
# Kotlin/JNI glue referenced crate-qualified long names — the .so linked with undefined symbols and
# ART failed at `System.loadLibrary`. This repo carried an env-replication workaround (step 05).
# BoltFFI 0.27.4/0.27.5 FIXED it (the Android JNI packaging fixes): `pack android --release` now emits
# crate-qualified names matching the glue. Verified in step 15 M4 with a 0.27.3-vs-0.27.5 `nm` control
# and a green `test:android` with no workaround (step-15 report, draft 01 → retired). Workaround removed.

boltffi pack android --release
"""

[tasks."test:android"]
description = "Run the instrumented probe suite on a headless Gradle-managed emulator (ART)."
depends = ["pack:android"]
dir = "android/profile-probe"
# AGP 8.7.3 needs Gradle 8.9–8.11 and a JDK 17–21 — it rejects the Homebrew default openjdk (26).
# Pinned per-task (not in [tools]) so `check` stays JDK-free. This is also why no gradle wrapper
# jar is committed: mise is the pin.
tools = { java = "temurin-21.0.11+10.0.LTS", gradle = "8.11.1" }
run = """
set -eu
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
if [ ! -d "$ANDROID_HOME" ]; then
  echo "error: Android SDK not found at $ANDROID_HOME — set ANDROID_HOME (VISION risk 5)." >&2
  exit 1
fi
# The Gradle Managed Device provisions this image itself, but only if the SDK can fetch it. Fail
# with the exact install command rather than an opaque Gradle stack trace.
if [ ! -d "$ANDROID_HOME/system-images/android-34/aosp_atd" ]; then
  echo "error: missing the aosp_atd android-34 system image (the headless test device)." >&2
  echo "  sdkmanager 'system-images;android-34;aosp_atd;arm64-v8a'" >&2
  exit 1
fi
# `dev34` is the managed device declared in build.gradle.kts. GMD boots it headlessly, runs the
# instrumented tests on ART, and tears it down — no GUI session, unlike step 03's XCUITest tier.
# The @HazardProbe class (H2, deliberate use-after-free) is excluded here; see test:android:hazard.
gradle dev34DebugAndroidTest "$@"
"""

# --- Step 07: the Kotlin/Compose spike app. Separate verbs from the probe, same headless GMD. ---

[tasks."test:android:app"]
description = "Run the Compose app's UI + VM + lifecycle tests on the headless emulator."
depends = ["pack:android"]
dir = "android/profile-app"
tools = { java = "temurin-21.0.11+10.0.LTS", gradle = "8.11.1" }
run = """
set -eu
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
if [ ! -d "$ANDROID_HOME" ]; then
  echo "error: Android SDK not found at $ANDROID_HOME — set ANDROID_HOME (VISION risk 5)." >&2
  exit 1
fi
if [ ! -d "$ANDROID_HOME/system-images/android-34/aosp_atd" ]; then
  echo "error: missing the aosp_atd android-34 system image (the headless test device)." >&2
  echo "  sdkmanager 'system-images;android-34;aosp_atd;arm64-v8a'" >&2
  exit 1
fi
# Compose UI tests on a headless Gradle-Managed Device — step 07's kill criterion 1, and the thing
# step-03's XCUITest tier structurally cannot do (it needs a GUI session + Accessibility permission).
gradle dev34DebugAndroidTest "$@"
"""

[tasks."run:android"]
description = "Install and launch the Compose spike app on a connected device/emulator (manual protocol)."
depends = ["pack:android"]
dir = "android/profile-app"
tools = { java = "temurin-21.0.11+10.0.LTS", gradle = "8.11.1" }
run = """
set -eu
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
adb="$ANDROID_HOME/platform-tools/adb"
if [ "$("$adb" devices | tail -n +2 | grep -c 'device$' || true)" -eq 0 ]; then
  echo "error: no device or emulator attached (see 'adb devices')." >&2
  exit 1
fi
gradle installDebug
"$adb" shell am start -n dev.bolted.profileapp/.MainActivity
"""

# The chattiness kill criterion, on the right CPU at last. Step 05 measured 12–13 µs per keystroke on
# an arm64 emulator running on an arm64 host: the right VM, the wrong core. Those numbers are LOWER
# BOUNDS. This verb refuses to run anywhere but physical silicon, so no emulator figure can ever be
# relabelled as a hardware one. See docs/steps/step-07-kotlin-compose-app.md, kill criterion 4.
[tasks."bench:android:device"]
description = "Re-measure the per-keystroke round-trip on a PHYSICAL device (refuses an emulator)."
depends = ["pack:android"]
dir = "android/profile-app"
tools = { java = "temurin-21.0.11+10.0.LTS", gradle = "8.11.1" }
run = """
set -eu
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
adb="$ANDROID_HOME/platform-tools/adb"
serials="$("$adb" devices | tail -n +2 | awk '$2=="device" {print $1}')"
if [ -z "$serials" ]; then
  echo "error: no device attached. Connect a phone with USB debugging enabled." >&2
  echo "  The benchmark deliberately refuses to run on an emulator (step-07 kill criterion 4)." >&2
  exit 1
fi
for s in $serials; do
  case "$s" in emulator-*)
    echo "error: '$s' is an emulator. Step 05 already measured that, and it is a lower bound." >&2
    echo "  Detach it, or connect a physical device and re-run." >&2
    exit 1 ;;
  esac
done
# `-Pbolted.hw` selects the @PhysicalDevice suite (and only it). `PhysicalChattinessProbe` also
# asserts on Build.FINGERPRINT, so the guard survives someone calling gradle directly. Belt and
# braces: a benchmark that lies about its hardware is worse than no benchmark.
gradle connectedDebugAndroidTest -Pbolted.hw "$@"
echo
echo "Numbers are in logcat under the 'BoltedApp' tag, and in:"
echo "  android/profile-app/build/reports/androidTests/connected/"
"""

[tasks."test:android:hazard"]
description = "Run ONLY the @HazardProbe use-after-close suite (H2). May crash the test process."
depends = ["pack:android"]
dir = "android/profile-probe"
tools = { java = "temurin-21.0.11+10.0.LTS", gradle = "8.11.1" }
run = """
set -eu
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
# Separate verb, and NOT part of test:android, because these probes dereference a freed handle on
# purpose (H2). A SIGSEGV aborts the whole instrumented process, so isolating them keeps a native
# crash from destroying the other 33 probes' results. A crash here IS the observation.
echo "note: this suite exercises undefined behaviour on purpose; a crash is a finding, not a bug." >&2
gradle dev34DebugAndroidTest -Pbolted.hazard "$@"
"""

# --- Step 14: the C# port (BoltFFI's C# backend → .NET, headless `dotnet test` on macOS). Separate
# verbs, deliberately NOT part of `check` (which stays Rust-only: no .NET SDK). The seam is
# host-portable even though the WinUI face is not — the step-05 move, backend #3. dotnet is pinned
# per-task (like the Android JDK/Gradle), never in [tools], so `check` never drags a ~225 MB SDK onto
# a box that only builds Rust. See docs/steps/step-14-csharp-port.md. ---

[tasks."pack:csharp"]
description = "Build the host dylib + generate the C# bindings and NuGet package (release, gen-profile-ffi)."
depends = ["setup:boltffi"]
dir = "crates/gen-profile-ffi"
tools = { dotnet = "10.0.301" }
env = { DOTNET_CLI_TELEMETRY_OPTOUT = "1", DOTNET_NOLOGO = "1" }
run = """
set -eu
export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
if ! command -v boltffi >/dev/null 2>&1; then
  echo "error: boltffi CLI not found — run 'mise run setup:boltffi'." >&2
  exit 1
fi
if ! command -v dotnet >/dev/null 2>&1; then
  echo "error: dotnet SDK not found — 'mise install' provides it (pinned per-task as dotnet@10.0.301)." >&2
  exit 1
fi
# `boltffi pack csharp` builds the host dylib; a fresh toolchain may lack even the host target.
if command -v rustup >/dev/null 2>&1; then
  rustup target add aarch64-apple-darwin >/dev/null 2>&1 || true
fi
# Pack owns dist/csharp: boltffi stages the csproj + src + runtimes and runs `dotnet pack` to emit the
# .nupkg (the native dylib rides in it under runtimes/osx-arm64/native, the NuGet convention the .NET
# runtime graph resolves). A stale tree makes "multiple producers" errors, exactly like pack:apple.
rm -rf dist/csharp
boltffi pack csharp
"""

[tasks."test:csharp"]
description = "Run the C# probe + emitted contract suite headless via `dotnet test` (packs first)."
depends = ["pack:csharp"]
dir = "csharp/profile-probe"
tools = { dotnet = "10.0.301" }
# `en` forces a locale-stable console (the SDK localises to the system language otherwise); the
# authoritative pass/fail is the TRX the task writes, but a readable summary helps. Telemetry off.
env = { DOTNET_CLI_TELEMETRY_OPTOUT = "1", DOTNET_NOLOGO = "1", DOTNET_CLI_UI_LANGUAGE = "en" }
run = """
set -eu
if ! command -v dotnet >/dev/null 2>&1; then
  echo "error: dotnet SDK not found — 'mise install' provides it (pinned per-task as dotnet@10.0.301)." >&2
  exit 1
fi
# The packed package version is fixed at 0.1.0 across re-packs, so a stale copy in the global NuGet
# cache would shadow a freshly-packed one. Evict just our package (NUnit/test-sdk stay cached) so
# every run restores the current dylib + bindings from the local feed. This is ours to evict.
rm -rf "${NUGET_PACKAGES:-$HOME/.nuget/packages}/gen_profile_ffi"
# TRX is the source of truth for counts (the step-13 lesson: never trust a wrapper's exit code
# blindly). Unlike `test:android`, `dotnet test` DOES propagate a nonzero exit on failure — proven
# once by M3's planted-red — so `set -e` above is a real gate, and the TRX is the audit trail.
dotnet test --logger "trx;LogFileName=profile-probe.trx" "$@"
"""

[tasks."run:apple"]
description = "Run the SwiftUI profile spike app (a GUI window; for the manual protocol)."
depends = ["pack:apple"]
run = """
set -eu
if ! command -v swift >/dev/null 2>&1; then
  echo "error: swift toolchain not found — the app needs Xcode (VISION risk 5)." >&2
  exit 1
fi
swift run --package-path apple/profile-app ProfileApp
"""
