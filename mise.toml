[tools]
rust = "1.95.0"
# Step 04 (web spike): the wasm bundler + the headless-wasm test runner, pinned like everything
# else. NOTE: mise's registry shortname `trunk` is the WRONG tool (trunk.io's launcher), so the
# bundler is pinned by GitHub repo instead.
"github:trunk-rs/trunk" = "0.21.14"
"github:rustwasm/wasm-pack" = "0.15.0"
# NOTE: the Android probe's JDK + Gradle are deliberately NOT here. They are scoped to the
# `test:android*` tasks (mise per-task `tools`) so that `mise run check` never drags a ~300 MB JDK
# onto a machine that only wants to build Rust. Same spirit as step 02 keeping `boltffi_cli` out of
# `[tools]`. See docs/steps/step-05-android-probe.md (Deliverable 3).

[tasks.test]
run = "cargo test --workspace"

[tasks.check]
run = [
  "cargo fmt --all --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
  "cargo test --workspace",
]

# --- Step 02: Apple probe (separate verbs; deliberately NOT part of `check`, so a box without
# Xcode/the boltffi CLI still runs `check` green). See docs/steps/step-02-boltffi-probe.md. ---

# The boltffi CLI cannot be pinned via mise's cargo backend in this repo: boltffi_bindgen builds
# through askama 0.16, whose template-path resolution breaks when the cargo registry lives behind
# a symlink (this machine's `~/.cargo` → dotfiles). Canonicalizing CARGO_HOME sidesteps it (a no-op
# on a normal, non-symlinked setup). Pinned version recorded here; see the step-02 report.
[tasks."setup:boltffi"]
description = "Install the pinned boltffi CLI (idempotent; works around the askama symlink bug)."
run = """
set -eu
want="0.27.3"
export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
if command -v boltffi >/dev/null 2>&1 && boltffi --version 2>/dev/null | grep -q "$want"; then
  echo "boltffi $want already installed"
  exit 0
fi
home="$(cd -P "${CARGO_HOME:-$HOME/.cargo}" 2>/dev/null && pwd || echo "${CARGO_HOME:-$HOME/.cargo}")"
echo "Installing boltffi_cli@$want (CARGO_HOME=$home) ..."
CARGO_HOME="$home" cargo install boltffi_cli --version "$want"
"""

[tasks."pack:apple"]
description = "Build + package the Apple XCFramework + SwiftPM bindings (release)."
depends = ["setup:boltffi"]
dir = "crates/spike-profile-ffi"
run = """
set -eu
export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
if ! command -v boltffi >/dev/null 2>&1; then
  echo "error: boltffi CLI not found — run 'mise run setup:boltffi'." >&2
  exit 1
fi
if ! command -v xcodebuild >/dev/null 2>&1; then
  echo "error: Xcode not found — the Apple probe needs Xcode + the Apple SDKs (VISION risk 5)." >&2
  exit 1
fi
# `boltffi pack apple` builds iOS device/sim + macOS x86_64/arm64; a fresh toolchain has only the
# host target and the pack fails with an opaque "build failed for targets". Install them if missing.
if command -v rustup >/dev/null 2>&1; then
  rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios x86_64-apple-darwin \
    >/dev/null 2>&1 || true
fi
boltffi pack apple --release
"""

[tasks."test:apple"]
description = "Run the Apple XCTests — probe + app VM tests — on the macOS slice (packs first)."
depends = ["pack:apple"]
run = """
set -eu
if ! command -v swift >/dev/null 2>&1; then
  echo "error: swift toolchain not found — the Apple probe needs Xcode (VISION risk 5)." >&2
  exit 1
fi
swift test --package-path apple/profile-probe
swift test --package-path apple/profile-app
"""

[tasks."test:apple:ui"]
description = "Run the XCUITest UI suite (items 2–6). Xcode + a logged-in GUI session required."
depends = ["pack:apple"]
dir = "apple/profile-app"
run = """
set -eu
# Deliberately NOT part of `check`/`test`/`test:apple`: XCUITest drives a real window, so it needs a
# logged-in GUI session AND the controlling app (terminal/editor) to hold Accessibility permission
# (System Settings → Privacy & Security → Accessibility). Without it the runner fails with
# "Timed out while enabling automation mode". See docs/steps/step-03-report.md.
if ! command -v xcodegen >/dev/null 2>&1; then
  echo "error: xcodegen not found — install with 'brew install xcodegen'." >&2
  exit 1
fi
xcodegen generate
xcodebuild test \
  -project ProfileAppUITest.xcodeproj \
  -scheme BoltedProfile \
  -destination 'platform=macOS' \
  -derivedDataPath .build-xcode
"""

# --- Step 04: Rust web spike (Leptos, browser CSR). Separate verbs; deliberately NOT part of
# `check` (which stays host-only, Xcode-free, browser-free) — the web work lives behind
# `build:web` / `serve:web` / `test:web`, exactly as the Apple work lives behind `pack:apple` /
# `test:apple`. See docs/steps/step-04-rust-web-app.md. ---

[tasks."build:web"]
description = "Release-build the Leptos web app to wasm and bundle it (Trunk runs wasm-opt)."
dir = "crates/profile-web"
run = """
set -eu
if ! command -v trunk >/dev/null 2>&1; then
  echo "error: trunk not found — run 'mise install' (pinned as github:trunk-rs/trunk)." >&2
  exit 1
fi
# A fresh toolchain has only the host target; self-heal like pack:apple does for the Apple targets.
if command -v rustup >/dev/null 2>&1; then
  rustup target add wasm32-unknown-unknown >/dev/null 2>&1 || true
fi
trunk build --release
"""

[tasks."serve:web"]
description = "Serve the web app with hot reload and open it in a browser (the manual protocol)."
dir = "crates/profile-web"
run = """
set -eu
if ! command -v trunk >/dev/null 2>&1; then
  echo "error: trunk not found — run 'mise install' (pinned as github:trunk-rs/trunk)." >&2
  exit 1
fi
if command -v rustup >/dev/null 2>&1; then
  rustup target add wasm32-unknown-unknown >/dev/null 2>&1 || true
fi
trunk serve --open
"""

[tasks."test:web"]
description = "Run the headless wasm-bindgen-test suite in Chrome (no GUI session needed)."
dir = "crates/profile-web"
run = """
set -eu
if ! command -v wasm-pack >/dev/null 2>&1; then
  echo "error: wasm-pack not found — run 'mise install' (pinned as github:rustwasm/wasm-pack)." >&2
  exit 1
fi
if [ ! -d "/Applications/Google Chrome.app" ] && ! command -v google-chrome >/dev/null 2>&1 \\
  && ! command -v chromium >/dev/null 2>&1; then
  echo "error: Chrome/Chromium not found — the headless wasm tier drives a real (headless)" >&2
  echo "browser engine. Install Google Chrome (wasm-pack fetches a matching chromedriver)." >&2
  exit 1
fi
if command -v rustup >/dev/null 2>&1; then
  rustup target add wasm32-unknown-unknown >/dev/null 2>&1 || true
fi
# --test web: only the DOM tier runs in the browser. The controller tests are host tests and
# already ran under `check`; building them for wasm would just be slow.
wasm-pack test --headless --chrome --test web
"""

# --- Step 05: Android headless probe (JNI + ART). Separate verbs, deliberately NOT part of `check`
# (which stays Rust-only: no JDK, no Android SDK, no emulator). See docs/steps/step-05-android-probe.md. ---

[tasks."pack:android"]
description = "Build the arm64-v8a .so + generate the Kotlin/JNI bindings (release)."
depends = ["setup:boltffi"]
dir = "crates/spike-profile-ffi"
run = """
set -eu
export PATH="${CARGO_HOME:-$HOME/.cargo}/bin:$PATH"
if ! command -v boltffi >/dev/null 2>&1; then
  echo "error: boltffi CLI not found — run 'mise run setup:boltffi'." >&2
  exit 1
fi
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
if [ ! -d "$ANDROID_HOME" ]; then
  echo "error: Android SDK not found at $ANDROID_HOME — set ANDROID_HOME (VISION risk 5)." >&2
  exit 1
fi
# boltffi finds the NDK via ANDROID_NDK_HOME; pick the newest installed one.
ndk="$(ls -d "$ANDROID_HOME"/ndk/* 2>/dev/null | sort -V | tail -1 || true)"
if [ -z "$ndk" ]; then
  echo "error: no Android NDK under $ANDROID_HOME/ndk — install one:" >&2
  echo "  sdkmanager 'ndk;27.0.12077973'" >&2
  exit 1
fi
export ANDROID_NDK_HOME="$ndk"
# A fresh toolchain has only the host target; self-heal like pack:apple and build:web do.
if command -v rustup >/dev/null 2>&1; then
  rustup target add aarch64-linux-android >/dev/null 2>&1 || true
fi

# --- BoltFFI 0.27.3 bug: `pack android` is broken out of the box. -----------------------------
# `pack apple` builds the crate with the binding-expansion environment (see the CLI's
# build/expansion.rs `env()`), which switches the `#[export]` macro to emit crate-qualified symbol
# names like `boltffi_method_class_spike_profile_ffi_profile_store_ffi_checkout`.
# `pack android` (pack/android/mod.rs) passes `env: Vec::new()` instead, so the macro falls back to
# legacy short names (`boltffi_profile_store_ffi_checkout`) — while the Kotlin/JNI glue and the C
# header it generates in the SAME run still reference the long names. The .so therefore links with
# undefined symbols and ART fails at `System.loadLibrary` with:
#   dlopen failed: cannot locate symbol "boltffi_register_callback_spike_profile_ffi_uniqueness_checker"
# Workaround: replicate what the Apple path exports. Drop this block when boltffi fixes pack android.
# See docs/steps/step-05-report.md (friction log).
crate_dir="$PWD"
export BOLTFFI_BINDING_EXPANSION=1
export BOLTFFI_BINDING_EXPANSION_ROOT="$crate_dir"
export BOLTFFI_BINDING_EXPANSION_SOURCE="$crate_dir/src/lib.rs"
export BOLTFFI_BINDING_EXPANSION_SURFACE=native
export RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }--cfg boltffi_binding_expansion"
# ---------------------------------------------------------------------------------------------

boltffi pack android --release
"""

[tasks."test:android"]
description = "Run the instrumented probe suite on a headless Gradle-managed emulator (ART)."
depends = ["pack:android"]
dir = "android/profile-probe"
# AGP 8.7.3 needs Gradle 8.9–8.11 and a JDK 17–21 — it rejects the Homebrew default openjdk (26).
# Pinned per-task (not in [tools]) so `check` stays JDK-free. This is also why no gradle wrapper
# jar is committed: mise is the pin.
tools = { java = "temurin-21.0.11+10.0.LTS", gradle = "8.11.1" }
run = """
set -eu
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
if [ ! -d "$ANDROID_HOME" ]; then
  echo "error: Android SDK not found at $ANDROID_HOME — set ANDROID_HOME (VISION risk 5)." >&2
  exit 1
fi
# The Gradle Managed Device provisions this image itself, but only if the SDK can fetch it. Fail
# with the exact install command rather than an opaque Gradle stack trace.
if [ ! -d "$ANDROID_HOME/system-images/android-34/aosp_atd" ]; then
  echo "error: missing the aosp_atd android-34 system image (the headless test device)." >&2
  echo "  sdkmanager 'system-images;android-34;aosp_atd;arm64-v8a'" >&2
  exit 1
fi
# `dev34` is the managed device declared in build.gradle.kts. GMD boots it headlessly, runs the
# instrumented tests on ART, and tears it down — no GUI session, unlike step 03's XCUITest tier.
# The @HazardProbe class (H2, deliberate use-after-free) is excluded here; see test:android:hazard.
gradle dev34DebugAndroidTest "$@"
"""

[tasks."test:android:hazard"]
description = "Run ONLY the @HazardProbe use-after-close suite (H2). May crash the test process."
depends = ["pack:android"]
dir = "android/profile-probe"
tools = { java = "temurin-21.0.11+10.0.LTS", gradle = "8.11.1" }
run = """
set -eu
: "${ANDROID_HOME:=$HOME/Library/Android/sdk}"
export ANDROID_HOME
export ANDROID_SDK_ROOT="$ANDROID_HOME"
# Separate verb, and NOT part of test:android, because these probes dereference a freed handle on
# purpose (H2). A SIGSEGV aborts the whole instrumented process, so isolating them keeps a native
# crash from destroying the other 33 probes' results. A crash here IS the observation.
echo "note: this suite exercises undefined behaviour on purpose; a crash is a finding, not a bug." >&2
gradle dev34DebugAndroidTest -Pbolted.hazard "$@"
"""

[tasks."run:apple"]
description = "Run the SwiftUI profile spike app (a GUI window; for the manual protocol)."
depends = ["pack:apple"]
run = """
set -eu
if ! command -v swift >/dev/null 2>&1; then
  echo "error: swift toolchain not found — the app needs Xcode (VISION risk 5)." >&2
  exit 1
fi
swift run --package-path apple/profile-app ProfileApp
"""
